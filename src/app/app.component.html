<mat-sidenav-container>
  <mat-sidenav #snav [mode]="isMobile ? 'over' : 'side'" [opened]="!isMobile">
    <div class="sidebar-logo">
      TENNIS<br>REPLAY
      <small>stroke analysis tool</small>
    </div>
    <mat-nav-list>
      <mat-list-item
        *ngFor="let item of navItems"
        (click)="navigate(item.route); isMobile && snav.close()"
        [ngClass]="{ 'active-link': isActive(item.route) }">
        <mat-icon matListIcon>{{ item.icon }}</mat-icon>
        <span>{{ item.label }}</span>
      </mat-list-item>
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content>
    <mat-toolbar>
      <button mat-icon-button (click)="snav.toggle()" style="color: var(--text);">
        <mat-icon>menu</mat-icon>
      </button>
      <span style="font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 2px; color: var(--accent); margin-left: 8px;">Tennis Replay</span>
    </mat-toolbar>
    <router-outlet></router-outlet>
  </mat-sidenav-content>
</mat-sidenav-container>
